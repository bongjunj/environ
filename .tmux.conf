# Reference: https://hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/

set-option -g default-shell /usr/bin/fish

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind-key -n F2 copy-mode
set-window-option -g mode-keys vi

# Enable mouse control (clickable windows, panes, resizable panes)
# set -g mouse on

# Smart pane navigation with awareness of Neovim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?)(diff)?(-wrapped)?$'"

bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "if-shell -F '#{pane_at_left}' 'send-keys C-h' 'select-pane -L'"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Keep Backspace behavior explicit when terminals report it separately from C-h.
bind-key -n BSpace send-keys BSpace

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind-key -n M-h resize-pane -L 5
bind-key -n M-j resize-pane -D 5
bind-key -n M-k resize-pane -U 5
bind-key -n M-l resize-pane -R 5

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# preserve modified keys
set -g xterm-keys on
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# windows are numbered from 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# refresh config with r
bind r source-file ~/.tmux.conf


# don't rename windows automatically with the last executed command
set-option -g allow-rename off

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=yellow'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=red bold'
