theme = "modus_vivendi_tinted"

[editor]
true-color = true
bufferline = "always"
rulers = [120]
end-of-line-diagnostics = "hint"
line-number = "relative"
mouse = false
shell = ["fish", "-c"]

[editor.whitespace.render]
space = "all"
tab = "all"
nbsp = "none"
nnbsp = "none"
newline = "none"

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "error"

[keys.normal]
C-r = [":reload-all"]

# lazyvim config
C-k = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]

# yazi config
C-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]

[editor.statusline]
left = [
  "mode",
  "spinner",
  "version-control",
  "spacer",
  "separator",
  "file-name",
  "read-only-indicator",
  "file-modification-indicator",
]
center = []
right = [
  "diagnostics",
  "workspace-diagnostics",
  "position",
  "total-line-numbers",
  "position-percentage",
  "file-encoding",
  "file-line-ending",
  "file-type",
  "register",
  "selections",
]
separator = "│"

