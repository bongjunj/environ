theme = "modus_vivendi_tritanopia"

[editor]
true-color = true
bufferline = "always"
rulers = [120]
end-of-line-diagnostics = "hint"
line-number = "relative"
shell = ["fish", "-c"]

[editor.whitespace.render]
space = "all"
tab = "all"
nbsp = "none"
nnbsp = "none"
newline = "none"

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "error"

[keys.normal]
C-k = [":new", ":insert-output lazygit", ":buffer-close!", ":redraw"]
C-r = [":reload-all"]


[editor.statusline]
left = [
  "mode",
  "spinner",
  "version-control",
  "spacer",
  "separator",
  "file-name",
  "read-only-indicator",
  "file-modification-indicator",
]
center = []
right = [
  "diagnostics",
  "workspace-diagnostics",
  "position",
  "total-line-numbers",
  "position-percentage",
  "file-encoding",
  "file-line-ending",
  "file-type",
  "register",
  "selections",
]
separator = "│"

